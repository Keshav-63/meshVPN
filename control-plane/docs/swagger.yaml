basePath: /
definitions:
  domain.DeploymentDetails:
    properties:
      deployment:
        $ref: '#/definitions/domain.DeploymentRecord'
      metrics:
        $ref: '#/definitions/domain.DeploymentMetrics'
      pods:
        items:
          $ref: '#/definitions/domain.PodMetrics'
        type: array
      resources:
        $ref: '#/definitions/domain.ResourceAllocation'
      scaling:
        $ref: '#/definitions/domain.ScalingInfo'
    type: object
  domain.DeploymentMetrics:
    properties:
      bandwidth_received_bytes:
        type: integer
      bandwidth_sent_bytes:
        type: integer
      cpu_usage_percent:
        type: number
      current_pods:
        type: integer
      deployment_id:
        type: string
      desired_pods:
        type: integer
      last_updated:
        type: string
      latency_p50_ms:
        type: number
      latency_p90_ms:
        type: number
      latency_p99_ms:
        type: number
      memory_usage_mb:
        type: number
      request_count_1h:
        type: integer
      request_count_24h:
        type: integer
      request_count_total:
        type: integer
      requests_per_second:
        type: number
    type: object
  domain.DeploymentRecord:
    properties:
      build_args:
        additionalProperties:
          type: string
        type: object
      build_logs:
        type: string
      container:
        type: string
      cpu_cores:
        type: number
      cpu_limit_milli:
        type: integer
      cpu_request_milli:
        type: integer
      cpu_target_utilization:
        type: integer
      deployment_id:
        type: string
      env:
        additionalProperties:
          type: string
        type: object
      error:
        type: string
      finished_at:
        type: string
      image:
        type: string
      max_replicas:
        type: integer
      memory_mb:
        type: integer
      min_replicas:
        type: integer
      node_selector:
        additionalProperties:
          type: string
        type: object
      owner_worker_id:
        type: string
      package:
        type: string
      port:
        type: integer
      repo:
        type: string
      requested_by:
        type: string
      scaling_mode:
        type: string
      started_at:
        type: string
      status:
        type: string
      subdomain:
        type: string
      url:
        type: string
      user_id:
        type: string
    type: object
  domain.PodMetrics:
    properties:
      age:
        description: e.g., "2h30m"
        type: string
      cpu_usage_milli:
        description: Current CPU usage in millicores
        type: integer
      created_at:
        type: string
      memory_usage_mb:
        description: Current memory usage in MB
        type: number
      pod_name:
        type: string
      ready:
        type: boolean
      restarts:
        type: integer
      status:
        description: Running, Pending, Failed, etc.
        type: string
    type: object
  domain.ResourceAllocation:
    properties:
      cpu_limit_milli:
        type: integer
      cpu_requested_milli:
        type: integer
      cpu_usage_milli:
        type: integer
      cpu_usage_percent:
        description: vs requested
        type: number
      memory_limit_mb:
        type: integer
      memory_requested_mb:
        type: integer
      memory_usage_mb:
        type: number
      memory_usage_percent:
        description: vs requested
        type: number
    type: object
  domain.ScalingInfo:
    properties:
      cpu_target_utilization:
        type: integer
      current_pods:
        type: integer
      desired_pods:
        type: integer
      hpa_enabled:
        type: boolean
      max_replicas:
        type: integer
      min_replicas:
        type: integer
      mode:
        description: '"none", "horizontal"'
        type: string
    type: object
  httpapi.AppLogsResponse:
    properties:
      application_logs:
        example: Server listening on port 3000...
        type: string
      container:
        example: myapp-container
        type: string
      cursor:
        example: 1200
        type: integer
      delta:
        example: true
        type: boolean
      deployment_id:
        example: dep-123456
        type: string
      next_cursor:
        example: 1680
        type: integer
      tail:
        example: 200
        type: integer
    type: object
  httpapi.BatchDeploymentRequestPayload:
    properties:
      requests:
        items:
          $ref: '#/definitions/httpapi.DeploymentRequestPayload'
        type: array
    required:
    - requests
    type: object
  httpapi.BuildLogsResponse:
    properties:
      build_logs:
        example: 'Step 1/5 : FROM node:18...'
        type: string
      deployment_id:
        example: dep-123456
        type: string
      status:
        example: building
        type: string
    type: object
  httpapi.DeployRequestPayload:
    properties:
      build_args:
        additionalProperties:
          type: string
        type: object
      cpu_cores:
        example: 0.5
        type: number
      cpu_limit_milli:
        example: 1000
        type: integer
      cpu_request_milli:
        example: 500
        type: integer
      cpu_target_utilization:
        example: 70
        type: integer
      env:
        additionalProperties:
          type: string
        type: object
      max_replicas:
        example: 3
        type: integer
      memory_mb:
        example: 512
        type: integer
      min_replicas:
        example: 1
        type: integer
      node_selector:
        additionalProperties:
          type: string
        type: object
      package:
        description: small, medium, large
        example: small
        type: string
      port:
        example: 3000
        type: integer
      repo:
        example: https://github.com/user/repo
        type: string
      scaling_mode:
        description: Advanced autoscaling options (optional)
        example: horizontal
        type: string
      subdomain:
        description: Optional - auto-generated if empty
        example: myapp
        type: string
    required:
    - repo
    type: object
  httpapi.DeployResponse:
    properties:
      autoscaling_enabled:
        example: true
        type: boolean
      cpu_cores:
        example: 0.5
        type: number
      cpu_target_utilization:
        example: 70
        type: integer
      deployment_id:
        example: dep-123456
        type: string
      max_replicas:
        example: 3
        type: integer
      memory_mb:
        example: 512
        type: integer
      memory_target_utilization:
        example: 75
        type: integer
      message:
        example: deployment queued
        type: string
      min_replicas:
        example: 1
        type: integer
      package:
        example: small
        type: string
      port:
        example: 3000
        type: integer
      repo:
        example: https://github.com/user/repo
        type: string
      scaling_mode:
        example: horizontal
        type: string
      status:
        example: pending
        type: string
      subdomain:
        example: myapp
        type: string
      url:
        example: https://myapp.keshavstack.tech
        type: string
    type: object
  httpapi.DeploymentInfo:
    properties:
      deployment_id:
        example: dep-123456
        type: string
      package:
        example: small
        type: string
      port:
        example: 3000
        type: integer
      repo:
        example: https://github.com/user/repo
        type: string
      scaling_mode:
        example: horizontal
        type: string
      status:
        example: running
        type: string
      subdomain:
        example: myapp
        type: string
    type: object
  httpapi.DeploymentListResponse:
    properties:
      deployments:
        items:
          $ref: '#/definitions/httpapi.DeploymentInfo'
        type: array
    type: object
  httpapi.DeploymentRequestPayload:
    properties:
      bytes_received:
        type: integer
      bytes_sent:
        type: integer
      deployment_id:
        description: UUID or subdomain
        type: string
      latency_ms:
        type: number
      method:
        type: string
      path:
        type: string
      status_code:
        type: integer
      timestamp:
        description: ISO 8601 format, optional
        type: string
    type: object
  httpapi.ErrorResponse:
    properties:
      error:
        example: Invalid request
        type: string
    type: object
  httpapi.HealthResponse:
    properties:
      status:
        example: LaptopCloud running
        type: string
    type: object
  httpapi.WhoAmIResponse:
    properties:
      email:
        example: user@example.com
        type: string
      provider:
        example: github
        type: string
      sub:
        example: user123
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
    url: https://github.com/keshavstack/MeshVPN-slef-hosting
  description: |-
    API for deploying and managing applications on MeshVPN platform
    This API provides endpoints for deploying applications, managing deployments, viewing logs, and monitoring analytics.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: MeshVPN Control Plane API
  version: "1.0"
paths:
  /api/telemetry/deployment-request:
    post:
      consumes:
      - application/json
      description: Records metrics for a single HTTP request to a user deployment
      parameters:
      - description: Request metrics
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.DeploymentRequestPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Record deployment HTTP request metrics
      tags:
      - Telemetry
  /api/telemetry/deployment-request/batch:
    post:
      consumes:
      - application/json
      description: Records metrics for multiple HTTP requests to user deployments
        in a batch
      parameters:
      - description: Batch of request metrics
        in: body
        name: requests
        required: true
        schema:
          $ref: '#/definitions/httpapi.BatchDeploymentRequestPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Record multiple deployment HTTP request metrics
      tags:
      - Telemetry
  /auth/whoami:
    get:
      description: Retrieve authenticated user's information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.WhoAmIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user information
      tags:
      - Authentication
  /deploy:
    post:
      consumes:
      - application/json
      description: Queue a new application deployment from a git repository
      parameters:
      - description: Deployment configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.DeployRequestPayload'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpapi.DeployResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Deploy a new application
      tags:
      - Deployments
  /deployments:
    get:
      description: Get a list of all deployments for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.DeploymentListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all deployments
      tags:
      - Deployments
  /deployments/{id}:
    get:
      description: Retrieve complete deployment information including config, metrics,
        pods, and resources
      parameters:
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.DeploymentDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get comprehensive deployment details
      tags:
      - Deployments
  /deployments/{id}/analytics:
    get:
      consumes:
      - application/json
      description: Get aggregated metrics for a specific deployment (backward compatible)
      parameters:
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Deployment analytics with metrics
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get deployment analytics
      tags:
      - Analytics
  /deployments/{id}/analytics/stream:
    get:
      consumes:
      - application/json
      description: Stream real-time metrics updates every 5 seconds via Server-Sent
        Events
      parameters:
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: string
      - description: JWT token (SSE doesn't support headers)
        in: query
        name: token
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stream live deployment metrics
      tags:
      - Analytics
  /deployments/{id}/app-logs:
    get:
      description: Retrieve runtime logs for a specific deployment
      parameters:
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: string
      - default: 200
        description: Number of log lines to retrieve (max 5000)
        in: query
        name: tail
        type: integer
      - description: Byte cursor for incremental logs (returns delta when provided)
        in: query
        name: cursor
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.AppLogsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get application runtime logs
      tags:
      - Deployments
  /deployments/{id}/app-logs/stream:
    get:
      consumes:
      - application/json
      description: Stream incremental application log updates to avoid duplicate polling
        payloads
      parameters:
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: string
      - default: 200
        description: Number of log lines to retrieve (max 5000)
        in: query
        name: tail
        type: integer
      - description: JWT token (SSE doesn't support headers)
        in: query
        name: token
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stream live application logs
      tags:
      - Deployments
  /deployments/{id}/build-logs:
    get:
      description: Retrieve build logs for a specific deployment
      parameters:
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.BuildLogsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get deployment build logs
      tags:
      - Deployments
  /deployments/{id}/build-logs/stream:
    get:
      consumes:
      - application/json
      description: Stream incremental build logs while deployment is building
      parameters:
      - description: Deployment ID
        in: path
        name: id
        required: true
        type: string
      - description: JWT token (SSE doesn't support headers)
        in: query
        name: token
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stream live build logs
      tags:
      - Deployments
  /health:
    get:
      description: Check if the API is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.HealthResponse'
      summary: Health check
      tags:
      - System
  /platform/analytics:
    get:
      consumes:
      - application/json
      description: Get system-wide metrics for admin/monitoring dashboard
      produces:
      - application/json
      responses:
        "200":
          description: Platform analytics
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get platform analytics
      tags:
      - Platform
  /platform/analytics/deployments:
    get:
      consumes:
      - application/json
      description: Returns per-deployment analytics rows for platform dashboards.
      produces:
      - application/json
      responses:
        "200":
          description: Per-deployment platform analytics
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get platform deployment analytics list
      tags:
      - Platform
  /platform/workers/{id}/analytics:
    get:
      consumes:
      - application/json
      description: Get analytics for a specific worker node
      parameters:
      - description: Worker ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Worker analytics
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get worker analytics
      tags:
      - Platform
  /user/analytics:
    get:
      consumes:
      - application/json
      description: Returns aggregate and per-deployment analytics for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: User analytics summary
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user analytics summary
      tags:
      - Analytics
  /workers:
    get:
      consumes:
      - application/json
      description: Get list of all worker nodes
      produces:
      - application/json
      responses:
        "200":
          description: List of workers
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List workers
      tags:
      - Platform
securityDefinitions:
  BearerAuth:
    description: 'Enter your JWT token in the format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
