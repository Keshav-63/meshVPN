apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Connect to Prometheus running natively in WSL
    # host.docker.internal resolves to WSL host from Docker container
    url: http://host.docker.internal:9090
    isDefault: true
    uid: prometheus
    editable: true
    jsonData:
      timeInterval: 5s
      httpMethod: POST
