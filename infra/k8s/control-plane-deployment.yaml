---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: default
spec:
  selector:
    app: control-plane
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: default
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
      - name: control-plane
        image: control-plane:latest  # Build this from your control-plane code
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: control-plane-secrets
              key: database-url
        - name: KUBECONFIG
          value: "/etc/kubernetes/kubeconfig"
        - name: K8S_NAMESPACE
          value: "meshvpn-apps"
        - name: RUNTIME_BACKEND
          value: "kubernetes"
        volumeMounts:
        - name: kubeconfig
          mountPath: /etc/kubernetes
          readOnly: true
      volumes:
      - name: kubeconfig
        secret:
          secretName: control-plane-kubeconfig
