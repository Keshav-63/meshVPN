services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=laptopcloud-proxy
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  control-plane:
    image: golang:1.26-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache git docker-cli && go mod download && go run ."
    environment:
      - APP_BASE_DOMAIN=${APP_BASE_DOMAIN:-localhost}
    volumes:
      - ../control-plane:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ../apps:/apps
    depends_on:
      - traefik
    networks:
      - proxy

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_METRICS=0.0.0.0:20242
    depends_on:
      - control-plane
      - traefik
    networks:
      - proxy

networks:
  proxy:
    name: laptopcloud-proxy
